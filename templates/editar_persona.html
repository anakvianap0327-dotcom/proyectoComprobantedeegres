<!DOCTYPE html>
<html>

<head>

<title>Editar Persona</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
}

/* inputs grandes para celular */
.form-control{
font-size:18px;
padding:12px;
}

/* botones grandes */
.btn{
font-size:18px;
padding:12px;
}

.card{
border-radius:12px;
}

</style>

</head>

<body class="bg-light">

<!-- BARRA DEL SISTEMA -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

<div class="container-fluid">

<a class="navbar-brand" href="/">Sistema Comprobantes</a>

<div class="navbar-nav">

<a class="nav-link" href="/">Inicio</a>
<a class="nav-link" href="/comprobante">Crear Comprobante</a>
<a class="nav-link" href="/personas">Registrar Persona</a>
<a class="nav-link" href="/consultar_personas">Consultar Personas</a>

</div>

</div>

</nav>


<div class="container-fluid mt-4">

<div class="row justify-content-center">

<div class="col-12 col-md-6 col-lg-5">

<div class="card shadow p-4">

<h3 class="mb-4 text-center">Editar Persona</h3>

<form method="POST" action="/actualizar_persona">

<input type="hidden" name="tipo" value="{{ tipo }}">

<div class="mb-3">

<label class="form-label">Documento</label>

<input 
type="text"
name="documento"
class="form-control form-control-lg"
value="{{ persona[0] }}"
readonly>

</div>

<div class="mb-3">

<label class="form-label">Nombre</label>

<input 
type="text"
name="nombre"
class="form-control form-control-lg"
value="{{ persona[1] }}">

</div>

<div class="mb-3">

<label class="form-label">Dirección</label>

<input 
type="text"
name="direccion"
class="form-control form-control-lg"
value="{{ persona[2] }}">

</div>

<div class="mb-3">

<label class="form-label">Celular</label>

<input 
type="text"
name="celular"
class="form-control form-control-lg"
value="{{ persona[3] }}">

</div>

<div class="d-grid gap-3">

<button class="btn btn-success btn-lg w-100">
Actualizar Persona
</button>

<a href="/consultar_personas" class="btn btn-secondary btn-lg w-100">
Volver
</a>

</div>

</form>

</div>

</div>

</div>

</div>

</body>
</html>
