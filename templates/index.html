<!DOCTYPE html>
<html>

<head>

<title>Sistema de Comprobantes de Egreso</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
}

/* título */
.titulo{
font-weight:700;
color:#1f2d3d;
}

/* tarjeta */
.card-panel{
border-radius:15px;
padding:40px;
}

/* botones */
.btn-sistema{
padding:20px;
font-size:20px;
font-weight:600;
border-radius:12px;
width:100%;
}

/* mejorar vista en celular */
@media (max-width:768px){

.container{
padding:20px;
}

.card-panel{
padding:30px;
}

.titulo{
font-size:24px;
}

.btn-sistema{
font-size:18px;
padding:18px;
}

}

</style>

</head>

<body>

<div class="container-fluid">

<div class="row justify-content-center align-items-center vh-100">

<!-- ancho grande en celular -->
<div class="col-11 col-sm-8 col-md-6 col-lg-4">

<div class="card shadow card-panel">

<div class="text-center mb-4">

<h2 class="titulo">Sistema de Comprobantes de Egreso</h2>

<p class="text-muted">Panel principal del sistema</p>

</div>

<div class="d-grid gap-3">

<a href="/comprobante" class="btn btn-primary btn-sistema">
Crear Comprobante
</a>

<a href="/personas" class="btn btn-success btn-sistema">
Registrar Trabajador / Proveedor
</a>

<a href="/consultar_personas" class="btn btn-info btn-sistema">
Consultar Personas
</a>

<a href="/consultar_comprobantes" class="btn btn-warning btn-sistema">
Consultar Comprobantes
</a>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
